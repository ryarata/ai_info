name: Deploy To GitHub Pages

on:
  workflow_dispatch:
    inputs:
      source_ids:
        description: "Optional comma-separated source IDs to refresh"
        required: false
        type: string
        default: ""
      pinned_source_item_urls:
        description: "Optional sourceId=url pairs for feed pinning"
        required: false
        type: string
        default: ""
      force_regen_source_ids:
        description: "Optional comma-separated source IDs to bypass translation and analysis cache"
        required: false
        type: string
        default: ""
      disable_alert_retention:
        description: "Disable same-article alert retention for this run"
        required: false
        type: boolean
        default: false
      deploy_result:
        description: "Deploy this run to GitHub Pages"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
  schedule:
    - cron: "0 0,3,12 * * *"

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ANTHROPIC_API_KEY secret is required for deployment."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Restore analysis cache
        id: analysis-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            data/updates.analyzed.json
            data/updates.generated.json
            data/snapshots
          key: ai-update-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ai-update-cache-

      - name: Refresh data and build static site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          ANTHROPIC_TRANSLATION_MODEL: ${{ vars.ANTHROPIC_TRANSLATION_MODEL || 'claude-3-5-haiku-20241022' }}
          ANTHROPIC_SUMMARY_MODEL: ${{ vars.ANTHROPIC_SUMMARY_MODEL || vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          SOURCE_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ids || '' }}
          PINNED_SOURCE_ITEM_URLS: ${{ github.event_name == 'workflow_dispatch' && inputs.pinned_source_item_urls || '' }}
          FORCE_REGEN_SOURCE_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.force_regen_source_ids || '' }}
          DISABLE_ALERT_RETENTION: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_alert_retention || false }}
        run: npm run refresh

      - name: Save analysis cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/updates.analyzed.json
            data/updates.generated.json
            data/snapshots
          key: ai-update-cache-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_result }}
        id: deployment
        uses: actions/deploy-pages@v4
