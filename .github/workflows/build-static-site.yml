name: Build Static Site

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh data and build static site
        run: npm run refresh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: public/
