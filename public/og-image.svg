      <stop offset="100%" stop-color="#e8dccd" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf1" />
      <stop offset="100%" stop-color="#f3e7d6" />
